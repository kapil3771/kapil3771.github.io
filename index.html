<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume</title>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; margin: 20px; }
        h1, h2 { color: #333; }
        .container { max-width: 800px; margin: auto; }
        .section { margin-bottom: 20px; }
        .contact { text-align: center; }
        .date { font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kapil Marathe</h1>
        <p class="contact">Email: kapilmarathe@gmail.com | Phone: 123-456-7890</p>

        <div class="section">
            <h2>Experience</h2>
            <p><strong>Job Title - Company</strong> <span class="date">(Start - End)</span></p>
            <p>Brief description of your role and achievements.</p>
        </div>

        <div class="section">
            <h2>Education</h2>
            <p><strong>Degree - University</strong> <span class="date">(Year)</span></p>
        </div>

        <div class="section">
            <h2>Skills</h2>
            <p>Skill 1, Skill 2, Skill 3</p>
        </div>
    </div>

</body>
</html>
